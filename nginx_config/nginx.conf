# =============================================================================
# nginx.conf — Nginx Reverse Proxy with SSL Termination
# =============================================================================
#
# CONFIGURATION — update the placeholders below before deploying:
#
#   EXPOSED_PORT        Must match the EXPOSE value in your Dockerfile (default: 16002)
#   SERVER_NAME         Your domain name (e.g., app.your-domain.com)
#   SSL_CERT_PATH       Full path to your SSL fullchain certificate inside the container
#   SSL_KEY_PATH        Full path to your SSL private key inside the container
#   APP_INTERNAL_PORT   Port Next.js runs on inside the container (default: 3000)
#
# CERTIFICATE NOTES:
#   Certificates should be mounted at runtime rather than baked into the image:
#
#     docker run -p 16002:16002 \
#       -v /path/to/your/certs:/etc/nginx/ssl \
#       your-image-name
#
#   Then set:
#     ssl_certificate     /etc/nginx/ssl/your-domain.fullchain.crt;
#     ssl_certificate_key /etc/nginx/ssl/your-domain.key;
#
# CLOUDFLARE / LOAD BALANCER:
#   If you are terminating SSL at Cloudflare or a load balancer in front of this
#   container, you can switch `listen` from SSL to plain HTTP and remove the ssl_*
#   directives. Nginx will then serve plain HTTP on EXPOSED_PORT and let your
#   upstream handle HTTPS.
# =============================================================================

events {
    # Maximum simultaneous connections per worker process.
    # Increase for high-traffic deployments (e.g., 4096).
    worker_connections 1024;
}

http {
    server {
        # ------------------------------------------------------------------
        # EXPOSED_PORT — must match Dockerfile EXPOSE and your docker run -p
        # Remove "ssl" if SSL is terminated upstream (Cloudflare, ALB, etc.)
        # ------------------------------------------------------------------
        listen 65093 ssl;

        # ------------------------------------------------------------------
        # SERVER_NAME — your fully-qualified domain name
        # ------------------------------------------------------------------
        server_name your-domain.com;

        # ------------------------------------------------------------------
        # SSL Certificates
        # SSL_CERT_PATH — path to fullchain certificate inside the container
        # SSL_KEY_PATH  — path to private key inside the container
        # ------------------------------------------------------------------
        ssl_certificate     /etc/nginx/ssl/your-domain.fullchain.crt;
        ssl_certificate_key /etc/nginx/ssl/your-domain.key;

        # Recommended SSL settings (compatible with Cloudflare and modern browsers)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;

        # ------------------------------------------------------------------
        # Proxy to Next.js
        # APP_INTERNAL_PORT — port Next.js runs on inside the container (default: 3000)
        # ------------------------------------------------------------------
        location / {
            proxy_pass http://localhost:3000;

            # WebSocket / Hot Reload support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';

            # Forward original host header
            proxy_set_header Host $host;

            # Bypass cache for WebSocket upgrades
            proxy_cache_bypass $http_upgrade;

            # Optional: forward real client IP to Next.js
            # proxy_set_header X-Real-IP $remote_addr;
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # Optional: serve static assets directly from Nginx for better performance
        # Uncomment and adjust the path if your public/ folder is available in the image
        # ------------------------------------------------------------------
        # location /_next/static/ {
        #     alias /app/.next/static/;
        #     expires 1y;
        #     access_log off;
        #     add_header Cache-Control "public, immutable";
        # }
        #
        # location /public/ {
        #     alias /app/public/;
        #     expires 7d;
        #     access_log off;
        # }
    }
}